aid: suno-ai
name: Suno
description: >-
  Suno is a Cambridge, Massachusetts-based generative AI music company building
  a consumer platform that lets anyone create original songs from natural
  language prompts. The product spans text-to-song generation, vocal and
  instrumental tracks, style and genre control, stem splitting, audio upload
  and remixing, lyric writing, and Suno Studio for advanced multi-track
  editing and custom model tuning. The company runs proprietary foundation
  models for music generation, the latest being v5.5, and ships consumer
  subscription plans (Free, Pro, Premier) with commercial usage rights on
  paid tiers. Founded in 2021 by Mikey Shulman, Georg Kucsko, Martin Camacho,
  and Keenan Freyberg, Suno closed a $250M Series C in November 2025 at a
  $2.45B valuation led by Menlo Ventures with participation from NVentures,
  Hallwood Media, Lightspeed, and Matrix. The company has announced a
  partnership with Warner Music Group. Suno does not publish an official
  developer API or SDK; the consumer surface is web and mobile applications
  authenticated via account login, and any third-party "Suno API" offerings
  are unofficial reverse-engineered wrappers. The suno-ai GitHub organization
  hosts the open-source Bark text-to-audio model and supporting tooling
  rather than a Suno product SDK.
